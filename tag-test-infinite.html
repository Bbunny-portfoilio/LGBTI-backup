<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>태그 필터 + 페이징</title>

  <style>
    * {
      box-sizing: border-box;
    }
  body {
    font-family: sans-serif;
    background: #f5f5f5;
    padding: 30px;
  }

  h1 {
    margin-bottom: 20px;
  }

  /* 태그 메뉴 */
  .tag-menu {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
  }

  .tag {
    padding: 8px 14px;
    border-radius: 999px;
    background: white;
    border: 1px solid #ccc;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
  }

  .tag:hover {
    background: #eee;
  }

  .tag.active {
    background: #0078ff;
    color: white;
    border-color: #0078ff;
  }

  /* 게시글 */
  .posts {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

/* 게시글 기본 상태 */
.post {
  width: calc(50% - 8px);
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  opacity: 0;
  transform: translateY(30px);
  filter: blur(10px);

  animation: fadeUp 0.7s cubic-bezier(.2,.8,.2,1) forwards;
}

/* 등장 애니메이션 */
@keyframes fadeUp {

  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

  .post h3 {
    margin-top: 0;
  }

  .post-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .post-tag {
    font-size: 12px;
    background: #eef3ff;
    color: #3366cc;
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* 로딩 영역 */
  #load-more-trigger {
    height: 40px;
  }

  .loading {
    text-align: center;
    padding: 20px;
    color: #666;
  }
  #sentinel {
    height: 1px;
  }
  </style>
  <script type="module" src="./js/infinite.js"></script>
</head>

<body>

  <!-- 태그 메뉴 -->
  <div class="tag-menu">

    <div class="tag" data-tag="HTML">HTML</div>

    <div class="tag" data-tag="CSS">CSS</div>

    <div class="tag" data-tag="JavaScript">JavaScript</div>

    <div class="tag" data-tag="React">React</div>

  </div>

  <!-- 게시글 -->
  <div class="posts" id="posts"></div>

  <!-- 로딩 감지 -->
  <div id="load-more-trigger"></div>

  <div class="loading" id="loading">
    게시글 불러오는 중...
  </div>
  
  <div id="sentinel"></div>

</body>

</html>
